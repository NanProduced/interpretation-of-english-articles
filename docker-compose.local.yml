services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claread-postgres
    environment:
      POSTGRES_DB: claread
      POSTGRES_USER: claread
      POSTGRES_PASSWORD: Nan12091209
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations/0001_initial_schema.sql:/docker-entrypoint-initdb.d/0001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claread -d claread"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: claread-redis
    command: ["redis-server", "--requirepass", "Nan12091209", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
